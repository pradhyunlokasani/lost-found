<!DOCTYPE html>
<html>
<head>
  <title>Found Items</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <a href="home.html">Home</a>
  <a href="lost.html">Lost</a>
  <a href="found.html">Found</a>
  <a href="help.html">Help</a>
  <span class="nav-indicator"></span>
</div>

<div class="container">
  <h2>Report Found Item</h2>
  <form id="foundForm">
    <input id="foundName" placeholder="Item Name" required>
    <input id="foundLocation" placeholder="Found At Location" required>
    <textarea id="foundDescription" placeholder="Description (Don't mention secret details)"></textarea>
    <input id="foundQuestion" placeholder="Verification Question (e.g. 'What is the lockscreen wallpaper?')" required>
    <input id="foundAnswer" placeholder="Correct Answer" required>
    <button type="submit">Post Found Item</button>
  </form>

  <hr>
  <h2>Found Items Registry</h2>
  <input type="text" id="foundSearch" placeholder="Search items..." onkeyup="searchItems('foundSearch', 'foundItems')">
  
  <div id="foundItems"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
</body>
</html>
