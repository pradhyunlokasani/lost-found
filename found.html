<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Found Items — Lost & Found Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="home.html">Home</a>
  <a href="lost.html">Lost</a>
  <a href="found.html" style="color: var(--amber);">Found</a>
  <a href="help.html">Help</a>
  <button class="logout-btn btn" onclick="logout()" style="margin-left:auto;">Logout</button>
</nav>

<div class="container">

  <!-- Report Form -->
  <div class="section-header" style="margin-top: 10px;">
    <h2>✨ Report a Found Item</h2>
  </div>

  <form id="foundForm">
    <label class="form-label">Item Name *</label>
    <input id="foundName" placeholder="e.g. Water Bottle, Notebook" required>

    <label class="form-label">Found At Location *</label>
    <input id="foundLocation" placeholder="e.g. Seminar Hall, Parking Lot" required>

    <label class="form-label">Description</label>
    <textarea id="foundDescription" placeholder="Describe the item without mentioning any secret detail"></textarea>

    <label class="form-label">Verification Question *</label>
    <input id="foundQuestion" placeholder="e.g. What is the lockscreen wallpaper?" required>

    <label class="form-label">🔒 Correct Answer * <small style="text-transform:none; font-size:.78rem;">(owner must answer this to claim)</small></label>
    <input id="foundAnswer" placeholder="Your answer here" required>

    <button type="submit">Post Found Item</button>
  </form>

  <hr>

  <!-- Registry -->
  <div class="section-header">
    <h2>Found Items Registry</h2>
    <span class="item-count" id="foundCount">Loading…</span>
  </div>

  <div class="search-wrap">
    <input type="text" id="foundSearch" placeholder="Search by name or location…"
           onkeyup="searchItems('foundSearch', 'foundItems')">
  </div>

  <div id="foundItems">
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
<script>
  function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  }
</script>
</body>
</html>
