<!DOCTYPE html>
<html>
<head>
  <title>Lost Items</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <a href="home.html">Home</a>
  <a href="lost.html">Lost</a>
  <a href="found.html">Found</a>
  <a href="help.html">Help</a>
  <span class="nav-indicator"></span>
</div>

<div class="container">
  <h2>Report Lost Item</h2>
  <form id="lostForm">
    <input id="lostName" placeholder="Item Name (e.g. Blue Wallet)" required>
    <input id="lostColor" placeholder="Color" required>
    <input id="lostLocation" placeholder="Last Seen Location" required>
    <textarea id="lostDescription" placeholder="General Description"></textarea>
    <input id="lostDetail" placeholder="Secret Identifying Detail (e.g. 'Sticker of a cat on back')" required>
    <button type="submit">Post Lost Item</button>
  </form>

  <hr>
  <h2>Lost Items Registry</h2>
  <input type="text" id="lostSearch" placeholder="Search items..." onkeyup="searchItems('lostSearch', 'lostItems')">
  
  <div id="lostItems"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
</body>
</html>
